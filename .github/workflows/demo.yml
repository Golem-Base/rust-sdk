name: Run examples and tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  run-examples:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the SDK repo
        uses: actions/checkout@v4

      - name: Setup Go, Rust and Golem Base
        uses: ./.github/workflows/setup

      - name: Run Rust demo example
        run: cargo run
        working-directory: ./demo

      - name: Run Rust yagna interaction example
        run: cargo run --example yagna_interaction

      - name: Build API binary
        run: cargo build
        working-directory: ./api

      - name: Start API server
        run: ./target/debug/golem-base-sdk-api &

      - name: Wait for API server to be ready
        run: |
          for i in {1..10}; do
            if curl -s http://127.0.0.1:8080/entities/foobar; then
              break
            fi
            sleep 1
          done

      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Run API integration test
        run: .github/workflows/test_api.sh
        env:
          ACCOUNT_ADDRESS: ${{ env.ACCOUNT_ADDRESS }}

  run-tests-and-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the SDK repo
        uses: actions/checkout@v4

      - name: Setup Go, Rust and Golem Base
        uses: ./.github/workflows/setup

      - name: Run tests
        run: cargo test

      - name: Build docs
        run: cargo doc --no-deps --workspace

      - name: Deploy docs to branch folder
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./target/doc
          publish_branch: gh-pages
          destination_dir: ${{ github.head_ref }}

      - name: Comment PR with docs URL
        if: github.event_name == 'pull_request'
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            Preview the generated documentation for this PR at:
            https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/${{ github.head_ref }}/golem_base_sdk/
